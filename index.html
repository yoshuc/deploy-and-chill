<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy & Chill — Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f59e0b'/><text x='16' y='22' text-anchor='middle' fill='%230f172a' font-size='16' font-weight='bold'>DC</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
<style>
:root {
  --bg: #0f172a;
  --bg-card: #1e293b;
  --bg-surface: #273449;
  --border: #334155;
  --border-light: #3e4f68;
  --text: #f8fafc;
  --text-secondary: #cbd5e1;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --text-faint: #475569;
  --amber: #f59e0b;
  --amber-dim: #f59e0b20;
  --emerald: #10b981;
  --emerald-dim: #10b98118;
  --red: #ef4444;
  --red-dim: #ef444418;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text-secondary);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--amber);color:var(--bg)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(160deg,#0f172a 0%,#0c1322 50%,#111827 100%)}
.login-box{max-width:400px;width:100%;text-align:center}
.login-logo{font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.login-title{font-size:32px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-0.5px}
.login-sub{font-size:14px;color:var(--text-dim);margin-bottom:40px;line-height:1.5}
.login-label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;display:block}
.login-btns{display:flex;flex-direction:column;gap:10px}
.login-btn{padding:18px 24px;border-radius:12px;border:2px solid var(--border);background:var(--bg-card);color:var(--text);
  font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;font-family:var(--sans);text-align:left;
  display:flex;align-items:center;gap:14px}
.login-btn:hover{border-color:var(--amber);background:var(--bg-surface);transform:translateY(-1px)}
.login-btn .avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:var(--bg);flex-shrink:0}
.login-btn .avatar.y{background:var(--amber)}
.login-btn .avatar.a{background:var(--emerald)}
.login-btn .role{font-size:12px;color:var(--text-dim);font-weight:400;margin-top:2px}

/* ── TOPBAR ── */
.topbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:14px 20px;
  display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;
  backdrop-filter:blur(12px);flex-wrap:wrap;gap:10px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:36px;height:36px;border-radius:9px;background:var(--amber);display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:800;color:var(--bg);flex-shrink:0;letter-spacing:-0.5px}
.topbar-text .ev-name{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.topbar-text .ev-date{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
.topbar-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.topbar-user{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:8px;
  background:var(--bg-surface);font-size:13px;color:var(--text-muted);font-weight:500}
.topbar-user .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.btn-logout{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;
  font-size:12px;color:var(--text-dim);cursor:pointer;font-family:var(--sans);transition:all .2s}
.btn-logout:hover{border-color:var(--text-dim);color:var(--text-muted)}

/* ── PROGRESS GLOBAL ── */
.progress-global{padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--border)}
.progress-row{display:flex;gap:16px;max-width:800px;margin:0 auto;flex-wrap:wrap}
.progress-item{flex:1;min-width:140px}
.progress-item .label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.progress-item .bar-wrap{height:6px;background:var(--bg-surface);border-radius:3px;overflow:hidden;margin-bottom:4px}
.progress-item .bar-fill{height:100%;border-radius:3px;transition:width .6s}
.progress-item .bar-fill.amber{background:var(--amber)}
.progress-item .bar-fill.emerald{background:var(--emerald)}
.progress-item .pct{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--text-muted)}

/* ── TABS ── */
.tabs-wrap{max-width:800px;margin:0 auto;padding:20px 20px 0;display:flex;gap:6px}
.tab-btn{padding:10px 22px;border-radius:10px 10px 0 0;border:1px solid var(--border);border-bottom:none;
  font-size:13px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--text-dim);
  transition:all .2s;font-family:var(--sans);position:relative}
.tab-btn.active{background:var(--bg-card);color:var(--text);border-color:var(--border)}
.tab-btn .tab-count{font-size:11px;font-family:var(--mono);margin-left:6px;padding:2px 7px;
  border-radius:10px;background:var(--bg-surface);color:var(--text-dim)}
.tab-btn.active .tab-count{background:var(--amber-dim);color:var(--amber)}

/* ── CONTAINER ── */
.container{max-width:800px;margin:0 auto;padding:0 20px 40px}
.checklist-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:0 12px 12px 12px;min-height:300px}

/* ── WEEK HEADER ── */
.week-header{padding:16px 20px 8px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border)}
.week-header .week-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:0.5px}
.week-header .week-title span{color:var(--text-dim);font-weight:500;margin-left:6px}
.week-header .week-count{font-size:11px;font-family:var(--mono);color:var(--text-dim)}
.week-current{border-left:3px solid var(--amber);background:var(--amber-dim)}

/* ── TASK ROW ── */
.task{border-bottom:1px solid #1e293b;transition:background .15s}
.task:last-child{border-bottom:none}
.task:hover{background:#ffffff04}
.task-main{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;cursor:pointer}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;
  margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;
  background:none}
.task-check:hover{border-color:var(--amber)}
.task-check.done{background:var(--emerald);border-color:var(--emerald)}
.task-check.done svg{opacity:1}
.task-check svg{opacity:0;transition:opacity .15s}
.task-body{flex:1;min-width:0}
.task-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-code{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--amber);
  background:var(--amber-dim);padding:2px 8px;border-radius:4px;flex-shrink:0}
.task-title{font-size:14px;font-weight:600;color:var(--text-secondary);line-height:1.4}
.task.done .task-title{color:var(--text-dim);text-decoration:line-through;text-decoration-color:var(--text-faint)}
.task.deprecated{opacity:0.4;pointer-events:none;user-select:none}
.task.deprecated .task-title{color:var(--text-faint);text-decoration:line-through;text-decoration-color:var(--text-faint)}
.task.deprecated .task-code{background:#ffffff08;color:var(--text-faint)}
.task.deprecated .task-check{background:var(--text-faint);border-color:var(--text-faint)}
.task.deprecated .task-check svg{opacity:1}
.task-meta{display:flex;gap:10px;margin-top:4px;align-items:center;flex-wrap:wrap}
.task-date{font-size:12px;font-family:var(--mono);color:var(--text-dim)}
.task-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.badge-overdue{background:var(--red-dim);color:var(--red)}
.badge-soon{background:var(--amber-dim);color:var(--amber)}
.badge-done{background:var(--emerald-dim);color:var(--emerald)}
.task-chevron{color:var(--text-faint);flex-shrink:0;transition:transform .2s;margin-top:2px}
.task.expanded .task-chevron{transform:rotate(90deg)}

/* ── TASK DETAIL ── */
.task-detail{padding:0 20px 16px 54px;display:none}
.task.expanded .task-detail{display:block;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.task-desc{font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:12px;white-space:pre-line}
.task-desc strong{color:var(--text-secondary);font-weight:600}
.task-script{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;
  margin-bottom:12px}
.task-script-title{font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:8px}
.task-script-body{font-size:13px;color:var(--text-muted);line-height:1.7;white-space:pre-line}
.task-questions{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;
  margin-bottom:12px}
.task-questions-title{font-size:11px;font-weight:700;color:var(--emerald);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:8px}
.task-questions ol{padding-left:18px;font-size:13px;color:var(--text-muted);line-height:1.8}
.task-questions li{margin-bottom:2px}
.task-notes-wrap{margin-top:12px}
.task-notes-label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:6px}
.task-notes{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg);color:var(--text-secondary);font-size:13px;font-family:var(--sans);
  resize:vertical;min-height:44px;max-height:200px;outline:none;transition:border-color .2s}
.task-notes:focus{border-color:var(--amber)}
.task-notes::placeholder{color:var(--text-faint)}

/* ── BUDGET ── */
.budget-section{max-width:800px;margin:24px auto 40px;padding:0 20px}
.budget-toggle{width:100%;padding:14px 20px;border-radius:12px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;
  font-family:var(--sans);display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.budget-toggle:hover{border-color:var(--border-light)}
.budget-toggle .budget-total{font-family:var(--mono);color:var(--amber)}
.budget-body{background:var(--bg-card);border:1px solid var(--border);border-top:none;
  border-radius:0 0 12px 12px;padding:16px 20px;display:none}
.budget-body.open{display:block}
.budget-table{width:100%;border-collapse:collapse}
.budget-table th{text-align:left;font-size:11px;font-weight:700;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:1px;padding:8px 0;border-bottom:1px solid var(--border)}
.budget-table th:nth-child(2),.budget-table th:nth-child(3){text-align:right}
.budget-table td{padding:8px 0;font-size:13px;color:var(--text-muted);border-bottom:1px solid #1e293b}
.budget-table td:nth-child(2),.budget-table td:nth-child(3){text-align:right;font-family:var(--mono);font-size:12px}
.budget-table tr:last-child td{border-bottom:none;font-weight:700;color:var(--text);padding-top:12px}
.budget-table .sobrante{color:var(--emerald)}

/* ── EVENT INFO ── */
.event-info{max-width:800px;margin:20px auto 0;padding:0 20px}
.event-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px}
.event-card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.agenda-row{display:flex;gap:12px;padding:6px 0;border-bottom:1px solid #1e293b;font-size:13px}
.agenda-row:last-child{border-bottom:none}
.agenda-time{font-family:var(--mono);color:var(--amber);font-size:12px;font-weight:600;
  min-width:54px;flex-shrink:0}
.agenda-what{color:var(--text-muted)}

/* ── ORDERS VIEW ── */
.orders-wrap{max-width:800px;margin:0 auto;padding:20px}
.orders-subtabs{display:flex;gap:6px;margin-bottom:16px}
.orders-subtab{padding:8px 18px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-weight:600;
cursor:pointer;background:var(--bg-card);color:var(--text-dim);transition:all .2s;font-family:var(--sans)}
.orders-subtab.active{background:var(--amber);color:var(--bg);border-color:var(--amber)}
.orders-group-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
color:var(--text-dim);padding:12px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px}
.orders-group-row{display:flex;justify-content:space-between;padding:8px 16px;background:var(--bg-card);
border-radius:8px;margin-bottom:4px;font-size:13px;color:var(--text-secondary)}
.orders-group-row .count{font-family:var(--mono);font-weight:700;color:var(--amber);min-width:30px;text-align:right}
.order-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.order-card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;
border-bottom:1px solid #1e293b;cursor:pointer}
.order-card-name{font-size:15px;font-weight:700;color:var(--text)}
.order-card-actions{display:flex;gap:8px}
.order-card-actions button{background:none;border:none;cursor:pointer;font-size:14px;padding:4px 8px;
border-radius:6px;transition:all .2s}
.order-card-actions .btn-del{color:var(--red)}
.order-card-actions .btn-del:hover{background:var(--red);background:#ef444420}
.order-card-body{padding:12px 18px}
.order-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:13px}
.order-item .oi-emoji{flex-shrink:0}
.order-item .oi-label{color:var(--text-dim);min-width:70px;flex-shrink:0}
.order-item .oi-value{color:var(--text-secondary);font-weight:500}
.order-item .oi-detail{color:var(--text-dim);font-family:var(--mono);font-size:11px}
.order-item.extra{color:var(--amber);font-style:italic}
.order-item.extra .oi-value{color:var(--amber)}
.order-extras-bar{display:flex;gap:6px;padding:10px 18px;border-top:1px solid #1e293b}
.order-extras-bar button{padding:6px 12px;border-radius:6px;border:1px dashed var(--border);
background:none;color:var(--text-dim);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .2s}
.order-extras-bar button:hover{border-color:var(--amber);color:var(--amber)}
.orders-account{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px}
.orders-account-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.orders-account-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:var(--text-muted)}
.orders-account-row.total{border-top:2px solid var(--amber);padding-top:12px;margin-top:8px;font-size:16px;
font-weight:800;color:var(--text);font-family:var(--mono)}
.orders-account-row .val{font-family:var(--mono);font-weight:600}
.extra-modal{position:fixed;inset:0;background:#000a;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.extra-modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px 16px 0 0;
padding:24px;width:100%;max-width:480px;max-height:70vh;overflow-y:auto}
.extra-modal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.extra-modal-opt{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-surface);
margin-bottom:6px;cursor:pointer;transition:all .2s}
.extra-modal-opt:hover{border-color:var(--amber)}
.extra-modal-opt .option-name{font-size:14px;font-weight:600;color:var(--text-secondary)}
.extra-modal-opt .option-desc{font-size:12px;font-family:var(--mono);color:var(--text-dim);margin-top:2px}
.extra-modal-cancel{width:100%;padding:12px;border-radius:10px;border:none;background:var(--bg-surface);
color:var(--text-muted);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;font-family:var(--sans)}

/* ── FOOTER ── */
.footer{max-width:800px;margin:0 auto;padding:20px;text-align:center}
.footer p{font-size:11px;color:var(--text-faint)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .topbar{padding:12px 14px}
  .topbar-text .ev-name{font-size:15px}
  .progress-row{flex-direction:column;gap:10px}
  .tabs-wrap{padding:16px 14px 0}
  .container{padding:0 14px 32px}
  .task-main{padding:12px 14px}
  .task-detail{padding:0 14px 14px 44px}
  .people-grid{grid-template-columns:1fr}
  .login-title{font-size:26px}
  .login-btn{padding:14px 18px}
  .budget-section{padding:0 14px}
  .event-info{padding:0 14px}
}

/* ── NOTES LOG ── */
.notes-section{margin-top:16px;border-top:1px solid var(--border);padding-top:16px}
.notes-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:12px;
  display:flex;align-items:center;gap:6px}
.notes-title span{font-family:var(--mono);font-size:10px;color:var(--text-faint);background:var(--bg-surface);padding:2px 6px;border-radius:4px}
.notes-log{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.note-entry{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative}
.note-entry:hover .note-actions{opacity:1}
.note-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.note-author{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.note-author .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.note-time{font-size:11px;font-family:var(--mono);color:var(--text-faint)}
.note-text{font-size:13px;color:var(--text-muted);line-height:1.6;white-space:pre-line;word-break:break-word}
.note-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.note-actions button{background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px;font-size:11px;
  font-family:var(--sans);color:var(--text-dim);transition:all .15s}
.note-actions button:hover{background:var(--bg-surface);color:var(--text-muted)}
.note-actions button.del:hover{color:var(--red)}
.note-attachments{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.note-attach-img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform .15s}
.note-attach-img:hover{transform:scale(1.05)}
.note-attach-file{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;
  background:var(--bg-surface);border:1px solid var(--border);font-size:12px;color:var(--text-muted);
  text-decoration:none;transition:all .15s}
.note-attach-file:hover{border-color:var(--amber);color:var(--text-secondary)}
.note-attach-file svg{flex-shrink:0}
.note-compose{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.note-compose.editing{border-color:var(--amber)}
.note-input{width:100%;padding:8px 0;border:none;background:none;color:var(--text-secondary);
  font-size:13px;font-family:var(--sans);resize:none;min-height:40px;max-height:160px;outline:none;line-height:1.5}
.note-input::placeholder{color:var(--text-faint)}
.note-compose-bar{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;
  border-top:1px solid #1e293b;flex-wrap:wrap;gap:8px}
.note-file-label{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;
  background:var(--bg-surface);border:1px solid var(--border);font-size:12px;color:var(--text-muted);
  cursor:pointer;transition:all .15s;font-family:var(--sans)}

const DB_BASE = "deploy_and_chill_2026";
const STORAGE_BASE = "deploy_and_chill_2026";

function initFirebase() {
  db.ref(DB_BASE + "/tasks").on("value", snap => {
    STATE.taskData = snap.val() || {};
    render();
  });
  db.ref(DB_BASE + "/orders").on("value", snap => {
    STATE.orders = snap.val() || {};
    render();
  });
}

function toggleTask(id) {
  const current = STATE.taskData[id]?.done || false;
  db.ref(DB_BASE + "/tasks/" + id).update({
    done: !current,
    doneAt: !current ? new Date().toISOString() : null,
    doneBy: !current ? STATE.user : null
  });
}

// ── NOTES CRUD ──
async function submitNote(taskId) {
  const textarea = document.getElementById("note-input-" + taskId);
  const text = textarea?.value?.trim();
  if (!text && !(STATE.pendingFiles[taskId]?.length)) return;

  STATE.uploading = true;
  render();

  try {
    let attachments = [];
    const files = STATE.pendingFiles[taskId] || [];
    for (const file of files) {
      const ts = Date.now();
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
      const path = STORAGE_BASE + "/" + taskId + "/" + ts + "_" + safeName;
      const ref = storage.ref(path);
      await ref.put(file);
      const url = await ref.getDownloadURL();
      attachments.push({ name: file.name, url, type: file.type, path });
    }

    if (STATE.editingNote?.taskId === taskId) {
      // Editing existing note
      const noteId = STATE.editingNote.noteId;
      const existing = STATE.taskData[taskId]?.notes?.[noteId];
      const oldAttachments = existing?.attachments || [];
      db.ref(DB_BASE + "/tasks/" + taskId + "/notes/" + noteId).update({
        text: text || "",
        editedAt: new Date().toISOString(),
        attachments: [...oldAttachments, ...attachments]
      });
      STATE.editingNote = null;
    } else {
      // New note
      const noteId = "n" + Date.now() + Math.random().toString(36).slice(2, 6);
      db.ref(DB_BASE + "/tasks/" + taskId + "/notes/" + noteId).set({
        text: text || "",
        author: STATE.user,
        timestamp: new Date().toISOString(),
        attachments
      });
    }
    STATE.pendingFiles[taskId] = [];
  } catch (e) {
    console.error("Error saving note:", e);
    alert("Error al guardar. Intenta de nuevo.");
  }
  STATE.uploading = false;
  render();
}

function startEditNote(taskId, noteId) {
  STATE.editingNote = { taskId, noteId };
  render();
  setTimeout(() => {
    const ta = document.getElementById("note-input-" + taskId);
    if (ta) { ta.focus(); ta.selectionStart = ta.value.length; }
  }, 50);
}

function cancelEdit(taskId) {
  STATE.editingNote = null;
  STATE.pendingFiles[taskId] = [];
  render();
}

function deleteNote(taskId, noteId) {
  if (!confirm("¿Eliminar esta nota?")) return;
  const note = STATE.taskData[taskId]?.notes?.[noteId];
  if (note?.attachments) {
    note.attachments.forEach(att => {
      if (att.path) storage.ref(att.path).delete().catch(() => {});
    });
  }
  db.ref(DB_BASE + "/tasks/" + taskId + "/notes/" + noteId).remove();
}

function removeAttachment(taskId, noteId, idx) {
  if (!confirm("¿Eliminar este archivo?")) return;
  const note = STATE.taskData[taskId]?.notes?.[noteId];
  if (!note?.attachments) return;
  const att = note.attachments[idx];
  if (att?.path) storage.ref(att.path).delete().catch(() => {});
  const updated = [...note.attachments];
  updated.splice(idx, 1);
  db.ref(DB_BASE + "/tasks/" + taskId + "/notes/" + noteId).update({ attachments: updated });
}

function handleFileSelect(taskId, input) {
  if (!input.files.length) return;
  if (!STATE.pendingFiles[taskId]) STATE.pendingFiles[taskId] = [];
  for (const f of input.files) {
    if (f.size > 10 * 1024 * 1024) { alert(f.name + " excede 10MB"); continue; }
    STATE.pendingFiles[taskId].push(f);
  }
  input.value = "";
  render();
}

function removePendingFile(taskId, idx) {
  STATE.pendingFiles[taskId].splice(idx, 1);
  render();
}

function showImage(url) { STATE.imageModal = url; render(); }
function closeImage() { STATE.imageModal = null; render(); }

// HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(s) { const d=document.createElement("div");d.textContent=s;return d.innerHTML; }
function today() { return new Date().toISOString().slice(0,10); }
function daysUntil(d) { return Math.floor((new Date(d)-new Date())/86400000); }
function fmtDate(d) { return new Date(d+"T12:00:00").toLocaleDateString("es",{weekday:"short",day:"numeric",month:"short"}); }

function getWeekNum() {
  const t = today();
  if (t <= "2026-05-14") return 1;
  if (t <= "2026-05-23") return 2;
  if (t <= "2026-05-30") return 3;
  if (t <= "2026-06-03") return 4;
  return 5;
}

function taskBadge(due, done) {
  if (done) return '<span class="task-badge badge-done">Completada</span>';
  const d = daysUntil(due);
  if (d < 0) return '<span class="task-badge badge-overdue">Vencida ' + Math.abs(d) + 'd</span>';
  if (d <= 2) return '<span class="task-badge badge-soon">' + d + 'd restantes</span>';
  return '';
}

function pct(tasks) {
  const active = tasks.filter(t => !t.deprecated);
  if (!active.length) return 0;
  const done = active.filter(t => STATE.taskData[t.id]?.done).length;
  return Math.round((done / active.length) * 100);
}

function renderDetail(t, notes) {
  const isEditing = STATE.editingNote?.taskId === t.id;
  const editNoteId = STATE.editingNote?.noteId;
  const editNoteData = editNoteId ? notes[editNoteId] : null;
  const pendingFiles = STATE.pendingFiles[t.id] || [];
  const noteEntries = Object.entries(notes || {}).filter(([k]) => k.startsWith("n")).sort((a,b) => (a[1].timestamp||"") > (b[1].timestamp||"") ? 1 : -1);
  const authorName = (a) => a === "yosh" ? "Josué Ubico" : a === "audelina" ? "Audelina Najera" : a || "—";
  const fmtTs = (ts) => { try { return new Date(ts).toLocaleDateString("es",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}) } catch { return ts } };
  const isImage = (type) => type && type.startsWith("image/");

  let html = '<div class="task-detail">';

  if (t.desc) {
    html += '<div class="task-desc">' + t.desc + '</div>';
  }

  if (t.script) {
    html += '<div class="task-script"><div class="task-script-title">Qué decir al llamar</div><div class="task-script-body">"' + esc(t.script) + '"</div></div>';
  }

  if (t.questions && t.questions.length) {
    html += '<div class="task-questions"><div class="task-questions-title">Preguntas que debe hacer (anotar cada respuesta)</div><ol>' + t.questions.map(function(q){ return '<li>' + esc(q) + '</li>' }).join('') + '</ol></div>';
  }

  // ── BITÁCORA ──
  html += '<div class="task-notes-wrap"><div class="task-notes-label">Bitácora</div>';

  // Existing notes
  if (noteEntries.length) {
    noteEntries.forEach(function(entry) {
      var nId = entry[0], n = entry[1];
      var isAuthorY = n.author === "yosh";
      var dotColor = isAuthorY ? "var(--amber)" : "var(--emerald)";
      html += '<div class="note-entry"><div class="note-entry-header">';
      html += '<div class="note-author"><span class="note-dot" style="background:' + dotColor + '"></span>';
      html += '<span class="note-author-name">' + esc(authorName(n.author)) + '</span>';
      html += '<span class="note-time">' + fmtTs(n.timestamp) + '</span>';
      if (n.editedAt) html += '<span class="note-time">(editada)</span>';
      html += '</div>';
      html += '<div class="note-actions">';
      html += '<button class="edit" onclick="event.stopPropagation();startEditNote(\'' + t.id + '\',\'' + nId + '\')" title="Editar">✎</button>';
      html += '<button class="del" onclick="event.stopPropagation();deleteNote(\'' + t.id + '\',\'' + nId + '\')" title="Eliminar">✕</button>';
      html += '</div></div>';
      if (n.text) html += '<div class="note-text">' + esc(n.text) + '</div>';
      if (n.attachments && n.attachments.length) {
        html += '<div class="note-attachments">';
        n.attachments.forEach(function(att, idx) {
          if (isImage(att.type)) {
            html += '<img class="note-attach-img" src="' + att.url + '" alt="' + esc(att.name) + '" onclick="event.stopPropagation();showImage(\'' + att.url + '\')" />';
          } else {
            html += '<a class="note-attach-file" href="' + att.url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">';
            html += '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 1h5l4 4v8H3V1z" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v4h4" stroke="currentColor" stroke-width="1.5"/></svg>';
            html += esc(att.name) + '</a>';
          }
        });
        html += '</div>';
      }
      html += '</div>';
    });
  }

  // Compose area
  html += '<div class="note-compose ' + (isEditing ? "editing" : "") + '">';
  html += '<textarea id="note-input-' + t.id + '" class="note-input" placeholder="' + (isEditing ? 'Editando nota...' : 'Escribe una nota, observación o adjunta un archivo...') + '" onclick="event.stopPropagation()">' + (isEditing && editNoteData ? esc(editNoteData.text || "") : "") + '</textarea>';

  // Pending files preview
  if (pendingFiles.length) {
    html += '<div class="note-pending-files">';
    pendingFiles.forEach(function(f, idx) {
      html += '<span class="note-pending-file">' + esc(f.name) + '<button onclick="event.stopPropagation();removePendingFile(\'' + t.id + '\',' + idx + ')">✕</button></span>';
    });
    html += '</div>';
  }

  html += '<div class="note-compose-bar">';
  html += '<label class="note-file-label" onclick="event.stopPropagation()">';
  html += '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Adjuntar';
  html += '<input type="file" multiple accept="image/*,.pdf,.doc,.docx,.xlsx,.xls" onchange="handleFileSelect(\'' + t.id + '\',this)" />';
  html += '</label>';
  html += '<div class="note-compose-actions">';
  if (isEditing) {
    html += '<button class="btn-cancel-note" onclick="event.stopPropagation();cancelEdit(\'' + t.id + '\')">Cancelar</button>';
  }
  html += '<button class="btn-submit-note" onclick="event.stopPropagation();submitNote(\'' + t.id + '\')"' + (STATE.uploading ? ' disabled' : '') + '>';
  html += STATE.uploading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Guardar');
  html += '</button>';
  html += '</div></div></div>';

  html += '</div>'; // task-notes-wrap
  html += '</div>'; // task-detail
  return html;
}

    <div class="orders-account-row"><span>12% Servicio</span><span class="val">Q${servicio.toFixed(2)}</span></div>
    <div class="orders-account-row total"><span>TOTAL</span><span>Q${total.toFixed(2)}</span></div>
    <div class="orders-account-row" style="margin-top:12px;border-top:1px solid var(--border);padding-top:8px">
      <span style="color:var(--amber)">Propina sugerida 10%</span><span class="val" style="color:var(--amber)">Q${propina.toFixed(2)}</span>
    </div>
    <div class="orders-account-row total" style="border-top-color:var(--emerald)"><span style="color:var(--emerald)">GRAN TOTAL</span><span style="color:var(--emerald)">Q${gran.toFixed(2)}</span></div>
  </div>`;

  h+=`</div>`;

  // Extra modal
  if(STATE.addingExtra){
    const ae=STATE.addingExtra;
    const items=EXTRA_ITEMS[ae.type]||[];
    const typeLabel=ae.type==="bebida"?"Bebida":ae.type==="postre"?"Postre":"Café";
    const selItem=ae.selectedItem;

    h+=`<div class="extra-modal" onclick="cancelExtra()">
      <div class="extra-modal-box" onclick="event.stopPropagation()">
        <div class="extra-modal-title">Agregar ${typeLabel} Extra</div>`;

    if(!selItem){
      // Step 1: select item
      h+=items.map(item=>`<div class="extra-modal-opt" onclick='selectExtraItem(${JSON.stringify(item).replace(/'/g,"&#39;")})'>
        <div class="option-name">${esc(item.name)}</div>
        <div class="option-desc">Q${item.price.toFixed(2)}${item.hasInput?" · requiere detalle":""}</div>
      </div>`).join("");
    }else{
      // Step 2: fill detail
      h+=`<div style="padding:12px 0">
        <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px">${esc(selItem.name)}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">Q${selItem.price.toFixed(2)}</div>
        <input type="text" class="sub-input" style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);font-size:14px;font-family:var(--sans);outline:none"
          placeholder="${esc(selItem.inputPlaceholder||"Especifica...")}"
          value="${esc(ae.detail)}" oninput="setExtraDetail(this.value)" autofocus>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text-muted);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)"
            onclick="STATE.addingExtra.selectedItem=null;render()">← Atrás</button>
          <button style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--amber);color:var(--bg);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans)"
            onclick="confirmSelectedExtra()">Agregar</button>
        </div>
      </div>`;
    }

    h+=`<button class="extra-modal-cancel" onclick="cancelExtra()">Cancelar</button>
      </div>
    </div>`;
  }

  return h;
}

function renderCocinaTab(entries){
  const groups={bebida:{},entrada:{},platoFuerte:{},postre:{},cafe:{}};
  entries.forEach(([id,o])=>{
    ["bebida","entrada","postre","cafe"].forEach(k=>{
      if(o[k]){const n=o[k].name+(o[k].detail?" ("+o[k].detail+")":"");groups[k][n]=(groups[k][n]||0)+1}
    });
    // Plato fuerte + guarnición juntos
    if(o.platoFuerte){
      const n=o.platoFuerte.name+(o.guarnicion?" · "+o.guarnicion:"");
      groups.platoFuerte[n]=(groups.platoFuerte[n]||0)+1;
    }
    if(o.extras)o.extras.forEach(e=>{const k=e.type||"bebida";const n=e.name+(e.detail?" ("+e.detail+")":"");groups[k][n]=(groups[k][n]||0)+1});
  });

  const labels={bebida:"Bebidas",entrada:"Entradas",platoFuerte:"Platos Fuertes + Guarnición",postre:"Postres",cafe:"Cafés"};
  let h=`<button onclick="exportPDF()" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--amber);
    background:var(--amber-dim);color:var(--amber);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);
    margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M5 7l3 3 3-3M3 12v2h10v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Exportar PDF para restaurante</button>`;

  Object.entries(labels).forEach(([k,label])=>{
    const items=Object.entries(groups[k]).sort((a,b)=>b[1]-a[1]);
    if(!items.length)return;
    h+=`<div class="orders-group-title">${label}</div>`;
    items.forEach(([name,count])=>{
      h+=`<div class="orders-group-row"><span>${esc(name)}</span><span class="count">${count}</span></div>`;
    });
  });
  return h;
}

function exportPDF(){
  const entries=Object.entries(STATE.orders).sort((a,b)=>(a[1].name||"").localeCompare(b[1].name||""));
  if(!entries.length){alert("No hay órdenes para exportar");return}

  // Build groups for summary
  const groups={bebida:{},entrada:{},platoFuerte:{},postre:{},cafe:{}};
  entries.forEach(([id,o])=>{
    ["bebida","entrada","postre","cafe"].forEach(k=>{
      if(o[k]){const n=o[k].name+(o[k].detail?" ("+o[k].detail+")":"");groups[k][n]=(groups[k][n]||0)+1}
    });
    if(o.platoFuerte){const n=o.platoFuerte.name+(o.guarnicion?" · "+o.guarnicion:"");groups.platoFuerte[n]=(groups.platoFuerte[n]||0)+1}
    if(o.extras)o.extras.forEach(e=>{const k=e.type||"bebida";const n=e.name+(e.detail?" ("+e.detail+")":"");groups[k][n]=(groups[k][n]||0)+1});
  });

  // Build totals
  let subtotalMenu=0,subtotalExtras=0;
  entries.forEach(([id,o])=>{
    let base=0;
    if(o.bebida)base+=o.bebida.price||0;if(o.entrada)base+=o.entrada.price||0;
    if(o.platoFuerte)base+=o.platoFuerte.price||0;if(o.postre)base+=o.postre.price||0;
    if(o.cafe)base+=o.cafe.price||0;subtotalMenu+=base;
    if(o.extras)o.extras.forEach(e=>subtotalExtras+=e.price||0);
  });
  const subtotal=subtotalMenu+subtotalExtras;
  const servicio=subtotal*0.12;
  const total=subtotal+servicio;

  const groupLabels={bebida:"Bebidas",entrada:"Entradas",platoFuerte:"Platos Fuertes + Guarnición",postre:"Postres",cafe:"Cafés"};

  let summaryHTML="";
  Object.entries(groupLabels).forEach(([k,label])=>{
    const items=Object.entries(groups[k]).sort((a,b)=>b[1]-a[1]);
    if(!items.length)return;
    summaryHTML+=`<h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;margin:16px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px">${label}</h3>`;
    items.forEach(([name,count])=>{
      summaryHTML+=`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span>${name}</span><strong>${count}</strong></div>`;
    });
  });

  let detailHTML="";
  entries.forEach(([id,o],idx)=>{
    detailHTML+=`<div style="margin-bottom:16px;padding:12px 16px;border:1px solid #e2e8f0;border-radius:8px;page-break-inside:avoid">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:#0f172a">${String(idx+1).padStart(2,"0")}. ${o.name||"Sin nombre"}</div>`;
    const lines=[];
    if(o.bebida)lines.push("🍺 "+o.bebida.name+(o.bebida.detail?" ("+o.bebida.detail+")":""));
    if(o.entrada)lines.push("🥗 "+o.entrada.name);
    else lines.push("🥗 Sin entrada");
    if(o.platoFuerte)lines.push("🥩 "+o.platoFuerte.name+(o.guarnicion?" · "+o.guarnicion:""));
    if(o.postre)lines.push("🍫 "+o.postre.name);
    else lines.push("🍫 Sin postre");
    if(o.cafe)lines.push("☕ "+o.cafe.name+(o.cafe.detail?" · "+o.cafe.detail:""));
    else lines.push("☕ Sin café");
    if(o.extras&&o.extras.length){
      o.extras.forEach(e=>{
        const emoji=e.type==="postre"?"🍫":e.type==="cafe"?"☕":"🍺";
        lines.push(emoji+" "+e.name+(e.detail?" ("+e.detail+")":"")+" [extra]");
      });
    }
    lines.forEach(l=>{detailHTML+=`<div style="font-size:12px;color:#334155;padding:2px 0;padding-left:16px">${l}</div>`});
    detailHTML+=`</div>`;
  });

  const w=window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Deploy & Chill — Orden Don Emiliano</title>
    <style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;padding:32px;color:#1e293b;max-width:800px;margin:0 auto}
    @media print{body{padding:16px}h1{font-size:18px!important}.no-print{display:none!important}}</style></head><body>

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;border-bottom:3px solid #f59e0b;padding-bottom:16px">
      <div><h1 style="font-size:22px;font-weight:800;color:#0f172a">Don Emiliano — Orden del evento</h1>
        <p style="font-size:13px;color:#64748b;margin-top:4px">Deploy & Chill · Jueves 4 de junio 2026 · ${entries.length} personas</p>
        <p style="font-size:13px;color:#64748b">Affinity Marketing International</p></div>
      <button class="no-print" onclick="window.print()" style="padding:10px 20px;border-radius:8px;border:none;background:#f59e0b;color:#0f172a;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans'">Imprimir / Guardar PDF</button>
    </div>

    <h2 style="font-size:16px;font-weight:800;color:#0f172a;margin-bottom:4px">Resumen de cantidades</h2>
    <p style="font-size:12px;color:#64748b;margin-bottom:12px">Para preparación en cocina</p>
    ${summaryHTML}

    <div style="margin:24px 0;border-top:2px solid #e2e8f0"></div>

    <h2 style="font-size:16px;font-weight:800;color:#0f172a;margin-bottom:4px">Detalle por persona</h2>
    <p style="font-size:12px;color:#64748b;margin-bottom:12px">Para servicio en mesa</p>
    ${detailHTML}

    <div style="margin:24px 0;border-top:2px solid #e2e8f0"></div>

    <div style="max-width:350px;margin-left:auto">
      <h2 style="font-size:16px;font-weight:800;color:#0f172a;margin-bottom:12px">Cuenta</h2>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span>Subtotal menú (${entries.length} personas)</span><span style="font-family:'JetBrains Mono'">Q${subtotalMenu.toFixed(2)}</span></div>
      ${subtotalExtras>0?`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span>Extras</span><span style="font-family:'JetBrains Mono'">Q${subtotalExtras.toFixed(2)}</span></div>`:""}
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span>Subtotal</span><span style="font-family:'JetBrains Mono'">Q${subtotal.toFixed(2)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span>12% Servicio</span><span style="font-family:'JetBrains Mono'">Q${servicio.toFixed(2)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:12px 0 0;margin-top:8px;border-top:2px solid #f59e0b;font-size:18px;font-weight:800"><span>TOTAL</span><span style="font-family:'JetBrains Mono'">Q${total.toFixed(2)}</span></div>
    </div>

    <div style="margin-top:32px;text-align:center;font-size:11px;color:#94a3b8">
      Deploy & Chill 2026 · Affinity Marketing International · Generado el ${new Date().toLocaleDateString("es",{day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"})}
    </div>
  </body></html>`);
  w.document.close();
}

function renderPersonaTab(entries){
  let h="";
  entries.forEach(([id,o])=>{
    const isExpanded=STATE.expanded["order_"+id];
    h+=`<div class="order-card">
      <div class="order-card-header" onclick="STATE.expanded['order_${id}']=!STATE.expanded['order_${id}'];render()">
        <span class="order-card-name">${esc(o.name||"Sin nombre")}</span>
        <div class="order-card-actions">
          <span style="font-size:12px;font-family:var(--mono);color:var(--text-dim)">Q${orderTotal(o).toFixed(2)}</span>
          <button class="btn-del" onclick="event.stopPropagation();deleteOrder('${id}')" title="Eliminar">🗑️</button>
        </div>
      </div>`;

    if(isExpanded){
      h+=`<div class="order-card-body">`;
      if(o.bebida)h+=`<div class="order-item"><span class="oi-emoji">🍺</span><span class="oi-label">Bebida</span><span class="oi-value">${esc(o.bebida.name)}${o.bebida.detail?" <span class='oi-detail'>"+esc(o.bebida.detail)+"</span>":""}</span></div>`;
      if(o.entrada)h+=`<div class="order-item"><span class="oi-emoji">🥗</span><span class="oi-label">Entrada</span><span class="oi-value">${esc(o.entrada.name)}</span></div>`;
      if(o.platoFuerte)h+=`<div class="order-item"><span class="oi-emoji">🥩</span><span class="oi-label">Plato</span><span class="oi-value">${esc(o.platoFuerte.name)}${o.guarnicion?" · "+esc(o.guarnicion):""}</span></div>`;
      if(o.postre)h+=`<div class="order-item"><span class="oi-emoji">🍫</span><span class="oi-label">Postre</span><span class="oi-value">${esc(o.postre.name)}</span></div>`;
      if(o.cafe)h+=`<div class="order-item"><span class="oi-emoji">☕</span><span class="oi-label">Café</span><span class="oi-value">${esc(o.cafe.name)}${o.cafe.detail?" <span class='oi-detail'>"+esc(o.cafe.detail)+"</span>":""}</span></div>`;
      if(o.extras&&o.extras.length){
        h+=`<div style="font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">Extras</div>`;
        o.extras.forEach((e,idx)=>{
          const emoji=e.type==="postre"?"🍫":e.type==="cafe"?"☕":"🍺";
          h+=`<div class="order-item extra"><span class="oi-emoji">${emoji}</span><span class="oi-value">${esc(e.name)}${e.detail?" <span class='oi-detail'>"+esc(e.detail)+"</span>":""}</span>
            <button onclick="event.stopPropagation();removeExtra('${id}',${idx})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;margin-left:auto">✕</button></div>`;
        });
      }
      h+=`</div>`;
      h+=`<div class="order-extras-bar">
        <button onclick="event.stopPropagation();addExtra('${id}','bebida')">+ Bebida</button>
        <button onclick="event.stopPropagation();addExtra('${id}','postre')">+ Postre</button>
        <button onclick="event.stopPropagation();addExtra('${id}','cafe')">+ Café</button>
      </div>`;
    }
    h+=`</div>`;
  });
  return h;
}
