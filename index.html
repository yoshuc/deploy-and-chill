<style>
:root {
  --bg: #0f172a;
  --bg-card: #1e293b;
  --bg-surface: #273449;
  --border: #334155;
  --border-light: #3e4f68;
  --text: #f8fafc;
  --text-secondary: #cbd5e1;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --text-faint: #475569;
  --amber: #f59e0b;
  --amber-dim: #f59e0b20;
  --emerald: #10b981;
  --emerald-dim: #10b98118;
  --red: #ef4444;
  --red-dim: #ef444418;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text-secondary);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--amber);color:var(--bg)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(160deg,#0f172a 0%,#0c1322 50%,#111827 100%)}
.login-box{max-width:400px;width:100%;text-align:center}
.login-logo{font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.login-title{font-size:32px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-0.5px}
.login-sub{font-size:14px;color:var(--text-dim);margin-bottom:40px;line-height:1.5}
.login-label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;display:block}
.login-btns{display:flex;flex-direction:column;gap:10px}
.login-btn{padding:18px 24px;border-radius:12px;border:2px solid var(--border);background:var(--bg-card);color:var(--text);
  font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;font-family:var(--sans);text-align:left;
  display:flex;align-items:center;gap:14px}
.login-btn:hover{border-color:var(--amber);background:var(--bg-surface);transform:translateY(-1px)}
.login-btn .avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:var(--bg);flex-shrink:0}
.login-btn .avatar.y{background:var(--amber)}
.login-btn .avatar.a{background:var(--emerald)}
.login-btn .role{font-size:12px;color:var(--text-dim);font-weight:400;margin-top:2px}

/* ── TOPBAR ── */
.topbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:14px 20px;
  display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;
  backdrop-filter:blur(12px);flex-wrap:wrap;gap:10px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:36px;height:36px;border-radius:9px;background:var(--amber);display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:800;color:var(--bg);flex-shrink:0;letter-spacing:-0.5px}
.topbar-text .ev-name{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.topbar-text .ev-date{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
.topbar-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.topbar-user{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:8px;
  background:var(--bg-surface);font-size:13px;color:var(--text-muted);font-weight:500}
.topbar-user .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.btn-logout{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;
  font-size:12px;color:var(--text-dim);cursor:pointer;font-family:var(--sans);transition:all .2s}
.btn-logout:hover{border-color:var(--text-dim);color:var(--text-muted)}

/* ── PROGRESS GLOBAL ── */
.progress-global{padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--border)}
.progress-row{display:flex;gap:16px;max-width:800px;margin:0 auto;flex-wrap:wrap}
.progress-item{flex:1;min-width:140px}
.progress-item .label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.progress-item .bar-wrap{height:6px;background:var(--bg-surface);border-radius:3px;overflow:hidden;margin-bottom:4px}
.progress-item .bar-fill{height:100%;border-radius:3px;transition:width .6s}
.progress-item .bar-fill.amber{background:var(--amber)}
.progress-item .bar-fill.emerald{background:var(--emerald)}
.progress-item .pct{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--text-muted)}

/* ── TABS ── */
.tabs-wrap{max-width:800px;margin:0 auto;padding:20px 20px 0;display:flex;gap:6px}
.tab-btn{padding:10px 22px;border-radius:10px 10px 0 0;border:1px solid var(--border);border-bottom:none;
  font-size:13px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--text-dim);
  transition:all .2s;font-family:var(--sans);position:relative}
.tab-btn.active{background:var(--bg-card);color:var(--text);border-color:var(--border)}
.tab-btn .tab-count{font-size:11px;font-family:var(--mono);margin-left:6px;padding:2px 7px;
  border-radius:10px;background:var(--bg-surface);color:var(--text-dim)}
.tab-btn.active .tab-count{background:var(--amber-dim);color:var(--amber)}

/* ── CONTAINER ── */
.container{max-width:800px;margin:0 auto;padding:0 20px 40px}
.checklist-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:0 12px 12px 12px;min-height:300px}

/* ── WEEK HEADER ── */
.week-header{padding:16px 20px 8px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border)}
.week-header .week-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:0.5px}
.week-header .week-title span{color:var(--text-dim);font-weight:500;margin-left:6px}
.week-header .week-count{font-size:11px;font-family:var(--mono);color:var(--text-dim)}
.week-current{border-left:3px solid var(--amber);background:var(--amber-dim)}

/* ── TASK ROW ── */
.task{border-bottom:1px solid #1e293b;transition:background .15s}
.task:last-child{border-bottom:none}
.task:hover{background:#ffffff04}
.task-main{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;cursor:pointer}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;
  margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;
  background:none}
.task-check:hover{border-color:var(--amber)}
.task-check.done{background:var(--emerald);border-color:var(--emerald)}
.task-check.done svg{opacity:1}
.task-check svg{opacity:0;transition:opacity .15s}
.task-body{flex:1;min-width:0}
.task-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-code{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--amber);
  background:var(--amber-dim);padding:2px 8px;border-radius:4px;flex-shrink:0}
.task-title{font-size:14px;font-weight:600;color:var(--text-secondary);line-height:1.4}
.task.done .task-title{color:var(--text-dim);text-decoration:line-through;text-decoration-color:var(--text-faint)}
.task-meta{display:flex;gap:10px;margin-top:4px;align-items:center;flex-wrap:wrap}
.task-date{font-size:12px;font-family:var(--mono);color:var(--text-dim)}
.task-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.badge-overdue{background:var(--red-dim);color:var(--red)}
.badge-soon{background:var(--amber-dim);color:var(--amber)}
.badge-done{background:var(--emerald-dim);color:var(--emerald)}
.task-chevron{color:var(--text-faint);flex-shrink:0;transition:transform .2s;margin-top:2px}
.task.expanded .task-chevron{transform:rotate(90deg)}

/* ── TASK DETAIL ── */
.task-detail{padding:0 20px 16px 54px;display:none}
.task.expanded .task-detail{display:block;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.task-desc{font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:12px;white-space:pre-line}
.task-desc strong{color:var(--text-secondary);font-weight:600}
.task-script{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;
  margin-bottom:12px}
.task-script-title{font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:8px}
.task-script-body{font-size:13px;color:var(--text-muted);line-height:1.7;white-space:pre-line}
.task-questions{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;
  margin-bottom:12px}
.task-questions-title{font-size:11px;font-weight:700;color:var(--emerald);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:8px}
.task-questions ol{padding-left:18px;font-size:13px;color:var(--text-muted);line-height:1.8}
.task-questions li{margin-bottom:2px}
.task-notes-wrap{margin-top:12px}
.task-notes-label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:6px}
.task-notes{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg);color:var(--text-secondary);font-size:13px;font-family:var(--sans);
  resize:vertical;min-height:44px;max-height:200px;outline:none;transition:border-color .2s}
.task-notes:focus{border-color:var(--amber)}
.task-notes::placeholder{color:var(--text-faint)}

/* ── BUDGET ── */
.budget-section{max-width:800px;margin:24px auto 40px;padding:0 20px}
.budget-toggle{width:100%;padding:14px 20px;border-radius:12px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;
  font-family:var(--sans);display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.budget-toggle:hover{border-color:var(--border-light)}
.budget-toggle .budget-total{font-family:var(--mono);color:var(--amber)}
.budget-body{background:var(--bg-card);border:1px solid var(--border);border-top:none;
  border-radius:0 0 12px 12px;padding:16px 20px;display:none}
.budget-body.open{display:block}
.budget-table{width:100%;border-collapse:collapse}
.budget-table th{text-align:left;font-size:11px;font-weight:700;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:1px;padding:8px 0;border-bottom:1px solid var(--border)}
.budget-table th:nth-child(2),.budget-table th:nth-child(3){text-align:right}
.budget-table td{padding:8px 0;font-size:13px;color:var(--text-muted);border-bottom:1px solid #1e293b}
.budget-table td:nth-child(2),.budget-table td:nth-child(3){text-align:right;font-family:var(--mono);font-size:12px}
.budget-table tr:last-child td{border-bottom:none;font-weight:700;color:var(--text);padding-top:12px}
.budget-table .sobrante{color:var(--emerald)}

/* ── EVENT INFO ── */
.event-info{max-width:800px;margin:20px auto 0;padding:0 20px}
.event-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px}
.event-card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.agenda-row{display:flex;gap:12px;padding:6px 0;border-bottom:1px solid #1e293b;font-size:13px}
.agenda-row:last-child{border-bottom:none}
.agenda-time{font-family:var(--mono);color:var(--amber);font-size:12px;font-weight:600;
  min-width:54px;flex-shrink:0}
.agenda-what{color:var(--text-muted)}

/* ── FOOTER ── */
.footer{max-width:800px;margin:0 auto;padding:20px;text-align:center}
.footer p{font-size:11px;color:var(--text-faint)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .topbar{padding:12px 14px}
  .topbar-text .ev-name{font-size:15px}
  .progress-row{flex-direction:column;gap:10px}
  .tabs-wrap{padding:16px 14px 0}
  .container{padding:0 14px 32px}
  .task-main{padding:12px 14px}
  .task-detail{padding:0 14px 14px 44px}
  .people-grid{grid-template-columns:1fr}
  .login-title{font-size:26px}
  .login-btn{padding:14px 18px}
  .budget-section{padding:0 14px}
  .event-info{padding:0 14px}
}
</style>
</head>

// ═══════════════════════════════════════════════════════════════
// FIREBASE SYNC
// ═══════════════════════════════════════════════════════════════
const DB_BASE = "deploy_and_chill_2026";

function initFirebase() {
  db.ref(DB_BASE + "/tasks").on("value", snap => {
    STATE.taskData = snap.val() || {};
    render();
  });
}

function toggleTask(id) {
  const current = STATE.taskData[id]?.done || false;
  db.ref(DB_BASE + "/tasks/" + id).update({
    done: !current,
    doneAt: !current ? new Date().toISOString() : null,
    doneBy: !current ? STATE.user : null
  });
}

let noteTimers = {};
function updateNote(id, value) {
  clearTimeout(noteTimers[id]);
  noteTimers[id] = setTimeout(() => {
    db.ref(DB_BASE + "/tasks/" + id).update({ notes: value });
  }, 800);
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(s) { const d=document.createElement("div");d.textContent=s;return d.innerHTML; }
function today() { return new Date().toISOString().slice(0,10); }
function daysUntil(d) { return Math.floor((new Date(d)-new Date())/86400000); }
function fmtDate(d) { return new Date(d+"T12:00:00").toLocaleDateString("es",{weekday:"short",day:"numeric",month:"short"}); }

function getWeekNum() {
  const t = today();
  if (t <= "2026-05-14") return 1;
  if (t <= "2026-05-23") return 2;
  if (t <= "2026-05-30") return 3;
  if (t <= "2026-06-03") return 4;
  return 5;
}

function taskBadge(due, done) {
  if (done) return '<span class="task-badge badge-done">Completada</span>';
  const d = daysUntil(due);
  if (d < 0) return '<span class="task-badge badge-overdue">Vencida ' + Math.abs(d) + 'd</span>';
  if (d <= 2) return '<span class="task-badge badge-soon">' + d + 'd restantes</span>';
  return '';
}

function pct(tasks) {
  if (!tasks.length) return 0;
  const done = tasks.filter(t => STATE.taskData[t.id]?.done).length;
  return Math.round((done / tasks.length) * 100);
}

function renderDetail(t, notes) {
  let html = '<div class="task-detail">';

  if (t.desc) {
    html += `<div class="task-desc">${t.desc}</div>`;

  if (t.script) {
    html += `<div class="task-script">
      <div class="task-script-title">Qué decir al llamar</div>
      <div class="task-script-body">"${esc(t.script)}"</div>
    </div>`;
  }

  if (t.questions && t.questions.length) {
    html += `<div class="task-questions">
      <div class="task-questions-title">Preguntas que debe hacer (anotar cada respuesta)</div>
      <ol>${t.questions.map(q => `<li>${esc(q)}</li>`).join('')}</ol>

  }

  html += `<div class="task-notes-wrap">
    <div class="task-notes-label">Notas y observaciones</div>
    <textarea class="task-notes" placeholder="Agrega notas aquí..." oninput="updateNote('${t.id}',this.value)">${esc(notes)}</textarea>
  </div>`;

  html += '</div>';
  return html;
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function login(who) {
  STATE.user = who;
  STATE.activeTab = who === "yosh" ? "yosh" : "audelina";
  localStorage.setItem("dc_user", who);
  initFirebase();
  render();
}

function logout() {
  STATE.user = null;
  STATE.activeTab = null;
  localStorage.removeItem("dc_user");
  render();
}

function switchTab(t) {
  STATE.activeTab = t;
  STATE.expanded = {};
  render();
}

function toggleExpand(id) {
  STATE.expanded[id] = !STATE.expanded[id];
  render();
}

function toggleBudget() {
  STATE.budgetOpen = !STATE.budgetOpen;
  render();
}
